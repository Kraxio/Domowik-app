<style>
  :root {
    --primary: #4f46e5; --primary-dark: #4338ca; --accent: #7c3aed;
    --primary-soft: #eef2ff; --bg: #f3f4f9; --card: #ffffff;
    --border: #e3e7ef; --text: #1c2433; --text-muted: #69707f;
    --shadow: 0 2px 6px rgba(20,30,60,.08), 0 8px 24px rgba(20,30,60,.08);
    --radius: 18px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --primary: #6d64f5; --primary-dark: #5b51e8; --accent: #9d5cf6;
      --primary-soft: #262350; --bg: #12151c; --card: #1c212c;
      --border: #2a3040; --text: #e6e9f0; --text-muted: #98a0b3;
      --shadow: 0 4px 16px rgba(0,0,0,.45);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px; }
  a { color: var(--primary); }

  /* pasek języków — przyklejony u góry */
  .langbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    padding: 12px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .langbar button {
    font: inherit; font-size: .82rem; font-weight: 600;
    padding: 6px 13px; border-radius: 999px;
    border: 1.5px solid var(--border); background: var(--card); color: var(--text);
    cursor: pointer; transition: background .15s, border-color .15s, color .15s;
  }
  .langbar button.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  /* ---------- hero ---------- */
  .hero {
    background:
      radial-gradient(120% 160% at 100% 0%, rgba(255,255,255,.14) 0%, transparent 45%),
      linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    color: #fff; padding: 52px 20px 60px; text-align: center;
  }
  .logo {
    width: 84px; height: 84px; margin: 0 auto 18px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.25));
  }
  .hero h1 { font-size: 2.1rem; font-weight: 800; letter-spacing: -0.01em; margin: 0 0 10px; }
  .hero p.tagline { font-size: 1.1rem; opacity: .95; max-width: 540px; margin: 0 auto 28px; }
  .cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 26px; border-radius: 999px; font-weight: 700; font-size: 1rem;
    text-decoration: none; cursor: pointer; border: none;
  }
  .btn-white { background: #fff; color: var(--primary-dark); }
  .btn-ghost { background: rgba(255,255,255,.16); color: #fff; border: 1.5px solid rgba(255,255,255,.5); }
  .badge-soon {
    display: inline-block; font-size: .72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .04em; background: rgba(255,255,255,.22); padding: 3px 9px;
    border-radius: 999px; margin-left: 8px; vertical-align: middle;
  }

  /* ---------- sekcje ---------- */
  section { padding: 48px 0; }
  h2 { font-size: 1.5rem; text-align: center; margin: 0 0 8px; }
  .lead { text-align: center; color: var(--text-muted); max-width: 560px; margin: 0 auto 32px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; }
  .feature-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; box-shadow: var(--shadow);
  }
  .feature-card .icon { font-size: 1.8rem; margin-bottom: 10px; display: block; }
  .feature-card h3 { font-size: 1.02rem; margin: 0 0 6px; }
  .feature-card p { font-size: .9rem; color: var(--text-muted); margin: 0; }

  /* ---------- karuzela zrzutów ekranu ---------- */
  .shots {
    display: flex; gap: 16px; overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 6px 4px 18px;
  }
  .shots img {
    height: 460px; max-height: 68vh; width: auto;
    border-radius: 22px; border: 1px solid var(--border);
    box-shadow: var(--shadow);
    scroll-snap-align: center;
    flex: 0 0 auto;
  }
  .shots-hint { text-align: center; font-size: .82rem; color: var(--text-muted); margin: 0; }

  /* ---------- prywatność ---------- */
  .privacy-banner {
    background: var(--primary-soft); border-radius: var(--radius);
    padding: 28px 24px; text-align: center; margin-top: 8px;
  }
  .privacy-banner h3 { margin: 0 0 8px; color: var(--primary); }
  .privacy-banner p { margin: 0 auto; color: var(--text); max-width: 520px; }

  /* ---------- premium ---------- */
  .premium-box {
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    color: #fff; border-radius: var(--radius); padding: 32px 24px; text-align: center;
  }
  .premium-box h2 { color: #fff; }
  .premium-price { font-size: 2rem; font-weight: 800; margin: 8px 0 4px; }
  .premium-note { opacity: .9; font-size: .9rem; margin-bottom: 20px; }
  .premium-list { list-style: none; padding: 0; margin: 0; display: inline-block; text-align: left; }
  .premium-list li { padding: 4px 0; font-size: .95rem; }
  .premium-list li::before { content: "✓ "; font-weight: 800; }

  /* ---------- języki ---------- */
  .lang-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .lang-chips span {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 999px;
    padding: 7px 16px; font-size: .88rem; font-weight: 600;
  }

  /* ---------- footer ---------- */
  footer {
    border-top: 1px solid var(--border); padding: 28px 20px 40px;
    text-align: center; color: var(--text-muted); font-size: .88rem;
  }
  footer a { color: var(--text-muted); text-decoration: underline; }
  footer .links { margin-bottom: 8px; }
  footer .links a { margin: 0 8px; }
</style>
</head>

(function () {
  var KEY = 'domowik-app-lang';
  var buttons = document.querySelectorAll('#langbar button');

  function apply(lang) {
    var dict = I18N[lang] || I18N.pl;
    document.querySelectorAll('[data-t]').forEach(function (el) {
      var v = dict[el.getAttribute('data-t')];
      if (v !== undefined) el.textContent = v;
    });
    buttons.forEach(function (b) { b.classList.toggle('active', b.getAttribute('data-lang') === lang); });
    document.documentElement.lang = lang;
    try { localStorage.setItem(KEY, lang); } catch (e) {}
  }

  buttons.forEach(function (b) {
    b.addEventListener('click', function () { apply(b.getAttribute('data-lang')); });
  });

  var saved = null;
  try { saved = localStorage.getItem(KEY); } catch (e) {}
  var sys = (navigator.language || 'pl').toLowerCase().slice(0, 2);
  apply(saved && I18N[saved] ? saved : (I18N[sys] ? sys : 'pl'));

  // Karuzela zrzutów: pokaż sekcję tylko, gdy przynajmniej jeden plik istnieje.
  var section = document.getElementById('screenshots');
  var imgs = document.querySelectorAll('#shots img');
  var loaded = 0;
  imgs.forEach(function (img) {
    img.addEventListener('load', function () { loaded++; section.hidden = false; });
    img.addEventListener('error', function () { img.remove(); });
  });
})();
</script>
